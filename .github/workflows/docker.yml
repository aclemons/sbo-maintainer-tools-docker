name: Docker build 15.0

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - build_sbo-maintainer-tools.sh

concurrency:
  group: docker-15.0-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: aclemons/sbo-maintainer-tools

jobs:
  docker:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    environment: dockerhub
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false
          persist-credentials: false

      - name: Configure sbo-maintainer-tools version
        run: |
          grep ^SBO_MAINTAINER_TOOLS_VERSION build_sbo-maintainer-tools.sh  | sed 's/"//g' >> "$GITHUB_ENV"

      - name: Configure binfmt version
        run: |
          BINFMT_IMAGE_VERSION="$(awk '/^FROM / {print $2}' binfmt/Dockerfile)"
          printf "BINFMT_IMAGE_VERSION=%s\n" "$BINFMT_IMAGE_VERSION" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          image: ${{ env.BINFMT_IMAGE_VERSION }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.SBO_MAINTAINER_TOOLS_VERSION }}
            type=raw,value=latest-15.0
            type=raw,value=${{ env.SBO_MAINTAINER_TOOLS_VERSION }}-15.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          pull: true
          push: true
          platforms: linux/386,linux/amd64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
