name: Docker build 15.0

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - build_sbo-maintainer-tools.sh

concurrency:
  group: docker-15.0-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: aclemons/sbo-maintainer-tools

jobs:
  docker:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    environment: dockerhub
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
          persist-credentials: false

      - name: Configure sbo-maintainer-tools version
        run: |
          grep ^SBO_MAINTAINER_TOOLS_VERSION build_sbo-maintainer-tools.sh  | sed 's/"//g' >> "$GITHUB_ENV"

      - name: Configure binfmt version
        run: |
          BINFMT_IMAGE_VERSION="$(awk '/^FROM / {print $2}' binfmt/Dockerfile)"
          printf "BINFMT_IMAGE_VERSION=%s\n" "$BINFMT_IMAGE_VERSION" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: ${{ env.BINFMT_IMAGE_VERSION }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to DockerHub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.SBO_MAINTAINER_TOOLS_VERSION }}
            type=raw,value=latest-15.0
            type=raw,value=${{ env.SBO_MAINTAINER_TOOLS_VERSION }}-15.0

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          pull: true
          push: true
          platforms: linux/386,linux/amd64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
