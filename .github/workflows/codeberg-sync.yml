name: Mirror Sync

on:
  workflow_dispatch:
  push:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  codeberg:
    name: Mirror to Codeberg
    runs-on: ubuntu-slim
    timeout-minutes: 10
    environment: codeberg-mirror
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          show-progress: false
          persist-credentials: false

      - name: Mirror to codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          max_attempts=3

          if [[ -z "$CODEBERG_TOKEN" ]]; then
            printf "CODEBERG_TOKEN is not set\n"
            exit 1
          fi

          git remote add mirror "https://codeberg.org/$REPO.git"

          # Use --force --prune for an exact mirror
          for attempt in $(seq 1 "$max_attempts"); do
            ret=0
            # shellcheck disable=SC2016
            git -c credential.helper='!f() { printf "%s\n" "username=$REPO_OWNER"; printf "%s\n" "password=$CODEBERG_TOKEN"; }; f' push --tags --force --prune mirror "refs/remotes/origin/*:refs/heads/*" || ret=$?
            if [[ $ret -eq 0 ]]; then
              break
            fi

            if [[ "$attempt" -eq "$max_attempts" ]]; then
              printf "Mirror push failed after %s attempts\n" "$max_attempts"
              exit $ret
            fi

            printf "Mirror push attempt %s failed; retrying\n" "$attempt"
          done

          git remote remove mirror
